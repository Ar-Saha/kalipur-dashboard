<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhatjangla Kalipur High School - Synchronized Dashboard</title>
    <script>
        // Set how often to refresh in milliseconds (70000 = 70 seconds)
        const refreshInterval = 70000; 

        setInterval(function() {
            const iframes = document.querySelectorAll('iframe');
            const currentTimestamp = new Date().getTime(); 

            iframes.forEach(iframe => {
                let url = iframe.src;
                if (url.includes('&cb=')) {
                    url = url.split('&cb=')[0];
                }
                iframe.src = url + "&cb=" + currentTimestamp;
            });
        }, refreshInterval);
    </script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; 
            background-color: #1e1e1e;
            overflow: hidden; 
            font-family: Arial, sans-serif;
        }

        /* * THE 50/50 SCROLLING GRID * */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 45% 55%; 
            grid-template-rows: 45% 55%; 
            grid-template-areas:
                "pos11 pos12" 
                "pos21 pos22"; 
            gap: 10px;
            padding: 5px; 
            height: 100vh;
            box-sizing: border-box;
        }

        .panel-pos11 { grid-area: pos11; } 
        .panel-pos12 { grid-area: pos12; } 
        .panel-pos21 { grid-area: pos21; } 
        .panel-pos22 { grid-area: pos22; } 

        .panel {
            background-color: #fff;
            border-radius: 4px;
            overflow: hidden; 
            position: relative;
        }

        /* * FROZEN HEADER MASK * */
        .header-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10; 
            background-color: #fff; 
            overflow: hidden; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3); 
        }

        .mask-top { height: 13%; } 

      /* * THE NEW HIGH-CONTRAST TARGETING LENS * */
        .lens-overlay {
            position: absolute;
            top: 13%; 
            width: 100%; 
            right: 1%;   
            height: 4%; 
            
            /* 1. THE FAINT WARM HIGHLIGHT */
            background-color: rgba(255, 255, 0, 0.08); 
            
            /* 2. THE PIERCING RED FRAME */
            border: 4px solid #FF0000; 
            border-radius: 8px; 
            
            z-index: 5; 
            pointer-events: none; 
            
            /* 3. THE "SUPER CLEAR" ILLUSION */
            backdrop-filter: contrast(1.65) saturate(1.5) brightness(0.95); 
            
            /* 4. THE DEEP BLACK SHADOW: Creates maximum contrast and physical depth */
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.65);
        }
        /* * THE SCROLLING WRAPPER * */
        .scroll-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
        }

        .scroll-top { animation: continuousScroll 50s infinite linear; }

        @keyframes continuousScroll {
            0%, 10% { transform: translateY(0); }           
            90%, 99.9% { transform: translateY(-188%); }    
            100% { transform: translateY(0); }              
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            pointer-events: none; 
            transform-origin: top left; 
            -webkit-font-smoothing: antialiased;
            backface-visibility: hidden;
        }

        /* * THE SCALING ENGINE * */
        .scale-sh1 { width: 500%; height: 500%; transform: scale(0.33, 0.50) translateZ(0); }
        .scale-sh4 { width: 500%; height: 500%; transform: scale(0.34, 0.50) translateZ(0); }
        .scale-sh2 { width: 500%; height: 500%; transform: scale(0.30, 0.43) translateZ(0); }
        .scale-sh3 { width: 500%; height: 500%; transform: scale(0.33, 0.33) translateZ(0); }

    </style>
</head>
<body>

    <div class="dashboard-grid">
        
        <div class="panel panel-pos11">
            <div class="header-mask mask-top">
                <iframe class="scale-sh1" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1923285599&range=A1:S43&widget=false&chrome=false"></iframe>
            </div>
            <div class="lens-overlay"></div>
            <div class="scroll-wrapper scroll-top">
                <iframe class="scale-sh1" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1923285599&range=A1:S43&widget=false&chrome=false"></iframe>
            </div>
        </div>

        <div class="panel panel-pos12">
            <div class="header-mask mask-top">
                <iframe class="scale-sh4" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=545381223&range=A1:S43&widget=false&chrome=false"></iframe>
            </div>
            <div class="lens-overlay"></div>
            <div class="scroll-wrapper scroll-top">
                <iframe class="scale-sh4" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=545381223&range=A1:S43&widget=false&chrome=false"></iframe>
            </div>
        </div>

        <div class="panel panel-pos21">
            <iframe class="scale-sh2" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1402037940&range=A1:Y20&widget=false&chrome=false"></iframe>
        </div>

        <div class="panel panel-pos22">
            <iframe class="scale-sh3" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1562054489&range=A1:X28&widget=false&chrome=false"></iframe>
        </div>

    </div>

</body>
</html>
