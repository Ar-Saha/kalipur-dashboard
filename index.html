<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhatjangla Kalipur High School - Automated Dashboard</title>
    <script>
        /* ==========================================
           1. AUTOMATIC TIME SWITCHER
           ========================================== */
        function checkTimeAndSwitch() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const currentTotalSeconds = (hours * 3600) + (minutes * 60) + seconds;

            // Start Time: 1:30:15 PM (13:30:15)
            const startTotalSeconds = (13 * 3600) + (30 * 60) + 15;
            // End Time: 2:09:45 PM (14:09:45)
            const endTotalSeconds = (14 * 3600) + (09 * 60) + 45;

            const mainView = document.getElementById('view-main');
            const specialView = document.getElementById('view-special');

            if (currentTotalSeconds >= startTotalSeconds && currentTotalSeconds <= endTotalSeconds) {
                if (specialView.style.display === 'none') {
                    specialView.style.display = 'block'; 
                    mainView.style.display = 'none';     
                }
            } else {
                if (mainView.style.display === 'none') {
                    mainView.style.display = 'block';    
                    specialView.style.display = 'none';  
                }
            }
        }

        setInterval(checkTimeAndSwitch, 1000);

        /* ==========================================
           2. 70-SECOND IFRAME REFRESHER
           ========================================== */
        const refreshInterval = 70000; 
        setInterval(function() {
            const iframes = document.querySelectorAll('iframe');
            const currentTimestamp = new Date().getTime(); 

            iframes.forEach(iframe => {
                let url = iframe.src;
                if (url.includes('&cb=')) {
                    url = url.split('&cb=')[0];
                }
                iframe.src = url + "&cb=" + currentTimestamp;
            });
        }, refreshInterval);

        window.onload = checkTimeAndSwitch;
    </script>
    
    <style>
        /* ==========================================
           GLOBAL CSS
           ========================================== */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #1e1e1e;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .panel {
            background-color: #fff;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            pointer-events: none; 
            transform-origin: top left; 
            -webkit-font-smoothing: antialiased;
            backface-visibility: hidden;
        }


        /* ==========================================
           VIEW 1: SPECIAL TIME DASHBOARD (FULL SCREEN SCROLL)
           ========================================== */
        .fullscreen-panel {
            width: 100%;
            height: 100vh;
            position: relative;
            background-color: #fff;
            overflow: hidden;
        }
	.scale-fs {
            width: 200vw; 
            height: 4000px; 
            transform: scale(1.14); 
            transform-origin: top left;
            position: absolute;
            left: 0;
            border: none;
            
            /* THE FIX: Use margin-top so it doesn't break our loop math! */
            margin-top: -30px; 
        }

        /* 2. Frozen Header Mask */
        .fs-header-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            
            /* TUNE THIS: Adjust to perfectly fit your 3 header rows */
            height: 12%; 
            
            z-index: 10;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.5);
        }

        /* 3. The Scrolling Engine */
        .fs-scroll-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            
            /* TUNE THIS: Change '90s' to make the scroll faster or slower */
            animation: fsContinuousScroll 125s infinite linear; 
        }

       .fs-original { 
            z-index: 1; 
            
            /* Lock the original exactly to the top */
            top: 0; 
        }

      .fs-clone {
            z-index: 2; 
            
            /* FIX 1: Change to hard pixels so it stops cutting off your clone's data! */
            clip-path: inset(135px 0 0 0); 
            
            /* FIX 2: Push it down by ~300px to stop crushing the last 15 rows */
            top: 3710px; 
        }
    @keyframes fsContinuousScroll {
            0% { transform: translateY(0); }           
            
            /* MUST MATCH EXACTLY! */
            100% { transform: translateY(-3710px); }    
        }
        /* ==========================================
           VIEW 2: MAIN DASHBOARD (DO NOT TOUCH - ALREADY TUNED)
           ========================================== */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 45% 55%; 
            grid-template-rows: 45% 55%; 
            grid-template-areas:
                "pos11 pos12" 
                "pos21 pos22"; 
            gap: 10px;
            padding: 5px; 
            height: 100vh;
            box-sizing: border-box;
        }

        .panel-pos11 { grid-area: pos11; } 
        .panel-pos12 { grid-area: pos12; } 
        .panel-pos21 { grid-area: pos21; } 
        .panel-pos22 { grid-area: pos22; } 

        .left-shadow-caster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 12%; 
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
            background-color: transparent;
            pointer-events: none;
            z-index: 8;
        }

        .right-header-mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 11%; 
            z-index: 8;
            overflow: hidden;
            background-color: #fff;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
        }

        .right-data-container {
            position: absolute;
            top: 11%; 
            left: 0;
            width: 100%;
            height: 95%; 
            z-index: 1;
            overflow: hidden;
        }

        .scale-sh1 { width: 500vw; height: 500vh; transform: scale(0.28, 0.52) translateZ(0); }
        .scale-sh4 { width: 500vw; height: 500vh; transform: scale(0.34, 0.42) translateZ(0); }
        .scale-sh2 { width: 500%; height: 500%; transform: scale(0.30, 0.43) translateZ(0); }
        .scale-sh3 { width: 500%; height: 500%; transform: scale(0.33, 0.33) translateZ(0); }

    </style>
</head>
<body>

    <div id="view-special" style="display: none;">
        <div class="fullscreen-panel">
            
            <div class="fs-header-mask">
                <iframe class="scale-fs" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1152467491&range=A1:Q3&widget=false&chrome=false"></iframe>
            </div>
            
            <div class="fs-scroll-wrapper">
                <iframe class="scale-fs fs-original" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1152467491&range=A1:Q123&widget=false&chrome=false"></iframe>
                <iframe class="scale-fs fs-clone" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1152467491&range=A1:Q123&widget=false&chrome=false"></iframe>
            </div>

        </div>
    </div>


    <div id="view-main" style="display: block;">
        <div class="dashboard-grid">
            
            <div class="panel panel-pos11">
                <div class="left-shadow-caster"></div>
                <iframe class="scale-sh1" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=545381223&range=A1:S20&widget=false&chrome=false"></iframe>
            </div>

            <div class="panel panel-pos12">
                <div class="right-header-mask">
                    <iframe class="scale-sh4" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=545381223&range=A1:S3&widget=false&chrome=false"></iframe>
                </div>
                <div class="right-data-container">
                    <iframe class="scale-sh4" style="margin-top: 0px;" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=545381223&range=A21:S43&widget=false&chrome=false"></iframe>
                </div>
            </div>

            <div class="panel panel-pos21">
                <iframe class="scale-sh2" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1402037940&range=A1:Y20&widget=false&chrome=false"></iframe>
            </div>

            <div class="panel panel-pos22">
                <iframe class="scale-sh3" src="https://docs.google.com/spreadsheets/d/1biShF8KbuYCAjdtH8YRYtotxFsA5ORlxrbcqfs1pIEY/htmlembed?gid=1562054489&range=A1:X28&widget=false&chrome=false"></iframe>
            </div>

        </div>
    </div>

</body>
</html>
